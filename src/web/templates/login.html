<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Podcast Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-black text-center mb-8 text-blue-600 uppercase tracking-tighter">Podcast Generator</h1>
        <form action="/login" method="post" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-2 px-1">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 transition-all font-medium">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 active:scale-95 transition shadow-lg shadow-blue-200 uppercase">
                Accedi
            </button>
        </form>
    </div>
</body>
</html>
