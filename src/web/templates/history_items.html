{% for ep in episodes %}
<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
    <div class="font-bold text-gray-800 leading-tight mb-2">{{ ep.title }}</div>
    <div class="text-xs text-gray-400 mb-4">{{ ep.date }}</div>
    <div class="flex justify-between items-center">
        <audio controls class="h-8 w-40">
            <source src="{{ ep.audio_path }}" type="audio/mpeg">
        </audio>
        <a href="{{ ep.audio_path }}" download class="p-2 bg-gray-50 rounded-lg text-blue-600 hover:bg-blue-600 hover:text-white transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </a>
    </div>
</div>
{% else %}
<div class="text-center py-12 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
    <p class="text-gray-400 font-medium italic">Nessun episodio trovato</p>
</div>
{% endfor %}
