<div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
    <div class="flex items-center gap-3 mb-6">
        <button hx-get="/articles"
                hx-target="#articles-container"
                hx-swap="innerHTML"
                class="text-slate-500 hover:text-slate-700 transition flex items-center gap-1.5 text-sm font-medium">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Torna agli articoli
        </button>
    </div>

    <div class="space-y-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 leading-snug">{{ title }}</h2>
            <div class="flex items-center gap-4 mt-3 text-sm text-slate-500">
                {% if date %}
                <span class="flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    {{ date }}
                </span>
                {% endif %}
                {% if duration %}
                <span class="flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    {{ duration }}
                </span>
                {% endif %}
            </div>
        </div>

        {% if description and not content_html %}
        <div class="bg-gray-50 rounded-xl p-5 border border-gray-200">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Descrizione</h3>
            <p class="text-gray-700 leading-relaxed">{{ description }}</p>
        </div>
        {% endif %}

        {% if content_html %}
        <div class="prose prose-slate max-w-none prose-headings:text-slate-900 prose-a:text-primary prose-img:rounded-xl prose-img:shadow-md prose-blockquote:border-primary prose-blockquote:bg-primary/5 prose-blockquote:py-2 prose-blockquote:px-4 prose-blockquote:not-italic prose-strong:text-slate-900 prose-code:bg-slate-100 prose-code:px-1.5 prose-code:rounded prose-code:text-sm">
            {{ content_html | safe }}
        </div>
        {% endif %}

        <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-slate-100">
            <button type="button"
                    hx-post="/generate"
                    hx-vals='{"article_urls":[{{ url|tojson }}],"newsletter_url":{{ newsletter_url|tojson }}}'
                    hx-target="#status-container"
                    hx-indicator="#gen-loading"
                    class="flex-1 bg-primary text-white px-8 py-3 rounded-xl font-black hover:bg-primary-dark active:scale-95 transition shadow-lg hover:shadow-blue-200 uppercase tracking-wider text-center">
                Genera Podcast
            </button>
            <a href="{{ url }}" target="_blank"
               class="flex-1 inline-flex items-center justify-center gap-2 px-8 py-3 rounded-xl font-medium text-primary bg-primary/5 hover:bg-primary/10 transition border border-primary/20">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
                Apri articolo originale
            </a>
        </div>
    </div>
</div>
