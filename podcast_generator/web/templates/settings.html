{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-8">
    <div class="flex items-center gap-4">
        <a href="/" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
        </a>
        <h1 class="text-3xl font-bold">Impostazioni</h1>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        <form action="/save-settings" method="POST" class="p-8 space-y-8">
            <!-- UI Customization -->
            <section class="space-y-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.828 2.828a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
                    </svg>
                    Personalizzazione UX
                </h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Colore Primario</label>
                        <div class="flex gap-2">
                            <input type="color" name="ui_primary_color" value="{{ config.ui_primary_color }}" class="h-10 w-20 rounded border-slate-200">
                            <input type="text" value="{{ config.ui_primary_color }}" class="flex-1 px-3 border border-slate-200 rounded-lg text-sm" readonly>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Colore Accento</label>
                        <div class="flex gap-2">
                            <input type="color" name="ui_accent_color" value="{{ config.ui_accent_color }}" class="h-10 w-20 rounded border-slate-200">
                            <input type="text" value="{{ config.ui_accent_color }}" class="flex-1 px-3 border border-slate-200 rounded-lg text-sm" readonly>
                        </div>
                    </div>
                </div>
            </section>

            <hr class="border-slate-100">

            <!-- IMAP Settings -->
            <section class="space-y-4">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    Posta in arrivo (IMAP)
                </h2>
                <div class="space-y-4">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-600">Host IMAP</label>
                            <input type="text" name="imap_host" value="{{ config.imap_host }}" placeholder="imap.gmail.com" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-slate-600">Porta/Folder</label>
                            <input type="text" name="imap_folder" value="{{ config.imap_folder }}" placeholder="INBOX" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Email</label>
                        <input type="email" name="imap_user" value="{{ config.imap_user }}" placeholder="user@example.com" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-600">Password / App Password</label>
                        <input type="password" name="imap_password" value="{{ config.imap_password }}" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all">
                    </div>
                </div>
            </section>

            <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-bold hover:bg-primary-dark active:scale-[0.98] transition shadow-lg shadow-blue-200">
                Salva Configurazioni
            </button>
        </form>
    </div>
</div>
{% endblock %}
